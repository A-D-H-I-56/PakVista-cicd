name: CD - Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Declare Environment
        run: echo "Environment is production"

      - name: Deploy to Render
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_PROD_URL }}

      - name: Confirm Deployment
        run: echo "Deployment to production triggered at $(date)"
